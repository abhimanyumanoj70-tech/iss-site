<!DOCTYPE html>
<html>
<head>
<title>3D Earth Control 🌍</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

canvas#stars {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

#scene {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>
<canvas id="scene"></canvas>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- OrbitControls -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/controls/OrbitControls.min.js"></script>

<script>

/* 🌌 STARS */
const starCanvas = document.getElementById("stars");
const starCtx = starCanvas.getContext("2d");

starCanvas.width = window.innerWidth;
starCanvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 300; i++) {
    stars.push({
        x: Math.random() * starCanvas.width,
        y: Math.random() * starCanvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 0.3
    });
}

function animateStars() {
    starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);

    stars.forEach(s => {
        s.y += s.speed;
        if (s.y > starCanvas.height) s.y = 0;

        starCtx.fillStyle = "white";
        starCtx.fillRect(s.x, s.y, s.size, s.size);
    });

    requestAnimationFrame(animateStars);
}
animateStars();

/* 🌍 3D EARTH */
const canvas = document.getElementById("scene");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);
camera.position.z = 2.5;

const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

/* 🖱️ MOUSE CONTROLS */
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableZoom = true;
controls.enablePan = false;

/* 🌍 EARTH */
const geometry = new THREE.SphereGeometry(1, 64, 64);

const texture = new THREE.TextureLoader().load(
    "https://threejs.org/examples/textures/earth_atmos_2048.jpg"
);

const material = new THREE.MeshStandardMaterial({
    map: texture
});

const earth = new THREE.Mesh(geometry, material);
scene.add(earth);

/* ☀️ LIGHT */
const light = new THREE.DirectionalLight(0xffffff, 1.2);
light.position.set(5, 3, 5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x404040));

/* 🔄 ANIMATION */
function animate() {
    requestAnimationFrame(animate);

    earth.rotation.y += 0.0015;

    controls.update(); // important for smooth control

    renderer.render(scene, camera);
}
animate();

/* 📱 RESIZE */
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);

    starCanvas.width = window.innerWidth;
    starCanvas.height = window.innerHeight;
});

</script>

</body>
</html>
